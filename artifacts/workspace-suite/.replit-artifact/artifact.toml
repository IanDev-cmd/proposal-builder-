kind = "web"
previewPath = "/"
title = "Workspace Suite"
version = "1.0.0"
id = "artifacts/workspace-suite"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23392

[services.development]
run = "pnpm --filter @workspace/workspace-suite run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/workspace-suite", "run", "build" ]
serve = "static"
publicDir = "artifacts/workspace-suite/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23392"
BASE_PATH = "/"
